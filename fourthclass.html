        .main-text{

        }

            /* padding: 10px; */

            transition: 0.4s;
        }
        /* Psudo Class  */

        .main-text button:hover{
            scale: 1.1;
            /* background-color: red; */
        }
        p{

        }
.container{
        display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    padding: 50px;
    justify-content: space-around;
}
.cards{
    padding: 40px;
    background-color: white;
    box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
    text-align: center;
    border-radius: 20px;
    transition: 1s;
}
.cards:hover{
    transform: translateY(-20px);
    transition: 0.5s;
}
.product-card{
    background-color: white;
    border-radius: 20px;
    box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
    /* padding: 10px; */
    position: relative;
    transition: 0.6s;
}
.product-card:hover{
    transform: translateY(-15px);
}
.product{
    display: grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap: 30px;
    padding: 50px;
}
.sale{
    position: absolute;
    background: red;
    padding: 8px 20px;
    border-radius: 30px;
    color: white;
    right: 30px;
    top: 30px;
}
.product-card img{
    width: 100%;
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
}

.product-card h3{
    padding: 15px;
    color: black;
}
.product-card  h4{
    margin: 15px;
    color: red;
}
.product-card button{
    margin: 15px;
    padding:12px 20px;
    color: white;
    background-color: #1e3c72;
}
button:hover{
    cursor:pointer;
}
.footer{
    display: flex;
    justify-content: center;
    background-color: #1e3c72;
    color: white;
    padding: 30px;
}
.text{
    text-align: center;
}
